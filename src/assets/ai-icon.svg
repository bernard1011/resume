<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <rect width="96" height="96" rx="22" fill="#1a0533"/>
  <rect width="96" height="96" rx="22" fill="url(#bg)" opacity="0.6"/>

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- glow під центральною нодою -->
  <circle cx="48" cy="48" r="18" fill="url(#glow-center)"/>

  <!-- з'єднання — яскраві лінії -->
  <line x1="48" y1="48" x2="18" y2="22" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="78" y2="22" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="12" y2="54" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="84" y2="54" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="28" y2="80" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="68" y2="80" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>

  <!-- слабші з'єднання між зовнішніми нодами -->
  <line x1="18" y1="22" x2="78" y2="22" stroke="#6d28d9" stroke-width="0.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="12" y1="54" x2="28" y2="80" stroke="#6d28d9" stroke-width="0.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="84" y1="54" x2="68" y2="80" stroke="#6d28d9" stroke-width="0.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="12" y2="54" stroke="#6d28d9" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="78" y1="22" x2="84" y2="54" stroke="#6d28d9" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- зовнішні ноди — з glow -->
  <circle cx="18" cy="22" r="4" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="78" cy="22" r="4" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="12" cy="54" r="4" fill="#312e81" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="84" cy="54" r="4" fill="#312e81" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="28" cy="80" r="4" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="68" cy="80" r="4" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>

  <!-- центральна нода — яскрава -->
  <circle cx="48" cy="48" r="11" fill="#4c1d95" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="48" cy="48" r="6" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1"/>
  <circle cx="48" cy="48" r="3" fill="#ddd6fe"/>
</svg>
